services:
  postgres:
    image: postgres:16-alpine
    container_name: nura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nura
      POSTGRES_PASSWORD: nura
      POSTGRES_DB: nura_dev
    ports:
      - "5432:5432"
    volumes:
      - nura_pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: nura-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
volumes:
  nura_pg_data:
